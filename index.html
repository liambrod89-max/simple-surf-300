<!DOCTYPE html><html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supersurf Search</title><style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#0f0f1a,#1b1b2e);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  text-align:center;
  width:100%;
  max-width:500px;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{
  font-size:60px;
  margin-bottom:25px;
  color:#00f5ff;
  text-shadow:0 0 20px #00f5ff;
}

input{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  outline:none;
}

button{
  margin-top:10px;
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#ff2d75;
  color:white;
  cursor:pointer;
  box-shadow:0 0 15px #ff2d75;
}

button:hover{
  transform:scale(1.03);
}

.small{
  margin-top:15px;
  font-size:12px;
  color:#aaa;
}
</style></head><body><div class="box">
  <h1>SUPERSURF</h1>  <input id="q" placeholder="Suche etwas oder gib eine URL ein">
  <button onclick="go()">Suchen</button>  <div class="small">Powered by Google Search</div>
</div><script>
function go(){
  let q = document.getElementById('q').value.trim();
  if(!q) return;

  let url;

  if(q.includes('.') && !q.includes(' ')){
    if(!q.startsWith('http')) q = 'https://' + q;
    url = q;
  } else {
    url = 'https://www.google.com/search?q=' + encodeURIComponent(q);
  }

  window.open(url,'_blank');
}

document.getElementById('q').addEventListener('keydown',function(e){
  if(e.key==='Enter') go();
});
</script></body>
</html>
