<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supersurf</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0f0f14;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* MAIN CARD */
.box{
  width:92%;
  max-width:650px;
  text-align:center;
  background:rgba(255,255,255,0.06);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(12px);
  box-shadow:0 0 30px rgba(0,0,0,0.4);
}

/* LOGO */
.logo{
  font-size:65px;
  margin-bottom:20px;
  font-weight:bold;
}

/* INPUT */
input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  font-size:16px;
  outline:none;
}

/* BUTTON */
button{
  margin-top:10px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#ff2d75,#ff6a00);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.02);
}

/* HISTORY */
.historyBox{
  margin-top:20px;
  text-align:left;
  max-height:180px;
  overflow:auto;
}

.item{
  padding:10px;
  margin:6px 0;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  cursor:pointer;
}

.item:hover{
  background:rgba(255,255,255,0.15);
}

/* SMALL TEXT */
.small{
  margin-top:15px;
  font-size:12px;
  color:#aaa;
}

</style>
</head>

<body>

<div class="box">

  <!-- LOGO -->
  <div class="logo">
    <span style="color:#4285F4;">S</span>
    <span style="color:#EA4335;">u</span>
    <span style="color:#FBBC05;">p</span>
    <span style="color:#34A853;">e</span>
    <span style="color:#4285F4;">r</span>
    <span style="color:#EA4335;">s</span>
    <span style="color:#FBBC05;">u</span>
    <span style="color:#34A853;">r</span>
    <span style="color:#4285F4;">f</span>
  </div>

  <!-- SEARCH -->
  <input id="q" placeholder="Suche oder URL eingeben">
  <button onclick="go()">Suchen</button>
  <button onclick="showHistory()">Verlauf anzeigen</button>

  <!-- HISTORY -->
  <div class="historyBox" id="historyBox"></div>

  <div class="small">Supersurf v1.0 • Final Release</div>

</div>

<script>

let history = JSON.parse(localStorage.getItem("history")) || [];

/* SAVE */
function save(text){
  history.unshift(text);
  if(history.length > 20) history.pop();
  localStorage.setItem("history", JSON.stringify(history));
}

/* GO */
function go(){

  let q = document.getElementById("q").value.trim();
  if(!q) return;

  save(q);

  if(q.includes(".") && !q.includes(" ")){
    if(!q.startsWith("http")){
      q = "https://" + q;
    }
    window.location.href = q;
  } else {
    window.location.href =
      "https://duckduckgo.com/?q=" + encodeURIComponent(q);
  }
}

/* HISTORY */
function showHistory(){

  let box = document.getElementById("historyBox");
  box.innerHTML = "";

  if(history.length === 0){
    box.innerHTML = "Kein Verlauf vorhanden.";
    return;
  }

  history.forEach(item => {

    let div = document.createElement("div");
    div.className = "item";
    div.innerText = item;

    div.onclick = () => {
      document.getElementById("q").value = item;
    };

    box.appendChild(div);
  });
}

</script>

</body>
</html>
