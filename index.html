<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supersurf GX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#0b0b10;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:70px;
background:#11121a;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:20px;
border-right:1px solid #222;
}

.dot{width:12px;height:12px;border-radius:50%;background:#ff2d75;box-shadow:0 0 10px #ff2d75;}
.dot2{background:#00f5ff;box-shadow:0 0 10px #00f5ff;}
.dot3{background:#a855f7;box-shadow:0 0 10px #a855f7;}

.main{flex:1;display:flex;flex-direction:column;}

.topbar{
display:flex;align-items:center;padding:10px;background:#12131c;border-bottom:1px solid #222;gap:10px;}

.logo{font-weight:bold;color:#00f5ff;text-shadow:0 0 10px #00f5ff;}

input{
flex:1;
padding:10px;
border-radius:10px;
border:none;
background:#1b1c28;
color:white;
outline:none;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#ff2d75;
color:white;
cursor:pointer;
box-shadow:0 0 10px #ff2d75;
}

button:hover{transform:scale(1.05);}

iframe{
flex:1;
width:100%;
border:none;
}

.home{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.home h1{
font-size:60px;
color:#00f5ff;
text-shadow:0 0 20px #00f5ff;
}

.home p{color:#aaa;}
</style>
</head>

<body>

<div class="sidebar">
<div class="dot"></div>
<div class="dot dot2"></div>
<div class="dot dot3"></div>
</div>

<div class="main">

<div class="topbar">
<div class="logo">Supersurf</div>
<input id="url" placeholder="URL oder Suche">
<button onclick="go()">Go</button>
</div>

<div class="home" id="home">
<h1>SUPERSURF</h1>
<p>Neon Gaming Browser</p>
</div>

<iframe id="frame"></iframe>

</div>

<script>
function go(){
let url=document.getElementById('url').value;
if(!url)return;
if(!url.startsWith('http'))url='https://'+url;
document.getElementById('home').style.display='none';
document.getElementById('frame').src=url;
}

document.getElementById('url').addEventListener('keypress',function(e){
if(e.key==='Enter')go();
});
</script>

</body>
</html>
