<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supersurf</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0f0f14;
  color:white;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* BUBBLES */
.bubble-layer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}

.bubble{
  position:absolute;
  border-radius:50%;
  pointer-events:auto;
  cursor:pointer;
  animation: floatUp linear forwards;
}

@keyframes floatUp{
  from{
    transform:translateY(100vh) scale(0.8);
    opacity:1;
  }
  to{
    transform:translateY(-120px) scale(1.2);
    opacity:0;
  }
}

.pop{
  animation: pop 0.25s forwards;
}

@keyframes pop{
  0%{transform:scale(1);opacity:1;}
  100%{transform:scale(2.5);opacity:0;}
}

/* BOX */
.box{
  position:relative;
  z-index:2;
  width:90%;
  max-width:600px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(10px);
}

/* LOGO */
.logo{
  font-size:65px;
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  font-size:16px;
  outline:none;
}

/* BUTTON */
button{
  margin-top:15px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  background:#ff2d75;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.small{
  margin-top:15px;
  font-size:12px;
  color:#aaa;
}

</style>
</head>

<body>

<!-- BUBBLES -->
<div class="bubble-layer" id="bubbleLayer"></div>

<!-- MAIN -->
<div class="box">

  <div class="logo">
    <span style="color:#4285F4;">S</span>
    <span style="color:#EA4335;">u</span>
    <span style="color:#FBBC05;">p</span>
    <span style="color:#34A853;">e</span>
    <span style="color:#4285F4;">r</span>
    <span style="color:#EA4335;">s</span>
    <span style="color:#FBBC05;">u</span>
    <span style="color:#34A853;">r</span>
    <span style="color:#4285F4;">f</span>
  </div>

  <input id="q" placeholder="Suche oder URL eingeben">
  <button onclick="go()">Suchen</button>

  <div class="small">
    Clean + Neon Bubble Mode
  </div>

</div>

<script>

/* SEARCH */
function go(){

  let q = document.getElementById("q").value.trim();
  if(!q) return;

  if(q.includes(".") && !q.includes(" ")){
    if(!q.startsWith("http")){
      q = "https://" + q;
    }
    window.location.href = q;
  } else {
    window.location.href =
      "https://duckduckgo.com/?q=" + encodeURIComponent(q);
  }
}

/* POP SOUND OPTIONAL */
function playPop(){
  const audio = new Audio("https://www.myinstants.com/media/sounds/pop.mp3");
  audio.volume = 0.3;
  audio.play();
}

/* BUBBLES */
const layer = document.getElementById("bubbleLayer");

const colors = ["#00f5ff","#ff2d75","#8b5cf6","#34A853","#FBBC05"];

function createBubble(){

  const b = document.createElement("div");
  b.classList.add("bubble");

  let size = 15 + Math.random()*50;

  b.style.width = size + "px";
  b.style.height = size + "px";

  b.style.left = Math.random()*window.innerWidth + "px";

  b.style.animationDuration = (5 + Math.random()*7) + "s";

  let color = colors[Math.floor(Math.random()*colors.length)];

  b.style.background =
    `radial-gradient(circle at 30% 30%, ${color}, rgba(255,255,255,0.1))`;

  layer.appendChild(b);

  b.addEventListener("click", () => {
    playPop();
    b.classList.add("pop");
    setTimeout(()=>b.remove(),250);
  });

  setTimeout(()=>b.remove(),12000);
}

setInterval(createBubble,180);

</script>

</body>
</html>
