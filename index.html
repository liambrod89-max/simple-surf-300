<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supersurf</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f0f1a,#1b1b2e);
  overflow:hidden;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CLOCK */
.clock{
  position:absolute;
  top:20px;
  right:20px;
  background:rgba(255,255,255,0.08);
  padding:10px 15px;
  border-radius:12px;
  backdrop-filter:blur(10px);
  font-weight:bold;
}

/* BUBBLES */
.bubble-layer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}

.bubble{
  position:absolute;
  border-radius:50%;
  pointer-events:auto;
  cursor:pointer;
  animation: floatUp linear forwards;
  box-shadow:0 0 15px rgba(255,255,255,0.2);
}

/* FLOAT */
@keyframes floatUp{
  from{transform:translateY(100vh) scale(0.8);opacity:1;}
  to{transform:translateY(-120px) scale(1.2);opacity:0;}
}

/* POP */
.pop{
  animation: pop 0.25s forwards;
}

@keyframes pop{
  0%{transform:scale(1);opacity:1;}
  100%{transform:scale(2.5);opacity:0;}
}

/* MAIN */
.box{
  position:relative;
  z-index:2;
  text-align:center;
  width:90%;
  max-width:650px;
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:25px;
  backdrop-filter:blur(10px);
}

/* LOGO */
.logo{
  font-size:70px;
  font-weight:bold;
  margin-bottom:25px;
}

/* INPUT */
input{
  width:100%;
  padding:15px;
  border-radius:40px;
  border:none;
  font-size:18px;
  outline:none;
}

/* BUTTON */
button{
  margin-top:15px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:40px;
  background:linear-gradient(90deg,#ff2d75,#ff6a00);
  color:white;
  font-size:18px;
  cursor:pointer;
}

.small{
  margin-top:20px;
  font-size:12px;
  color:#aaa;
}

</style>
</head>

<body>

<!-- BUBBLES -->
<div class="bubble-layer" id="bubbleLayer"></div>

<!-- CLOCK -->
<div class="clock" id="clock">00:00:00</div>

<!-- MAIN -->
<div class="box">

  <h1 class="logo">
    <span style="color:#4285F4;">S</span>
    <span style="color:#EA4335;">u</span>
    <span style="color:#FBBC05;">p</span>
    <span style="color:#34A853;">e</span>
    <span style="color:#4285F4;">r</span>
    <span style="color:#EA4335;">s</span>
    <span style="color:#FBBC05;">u</span>
    <span style="color:#34A853;">r</span>
    <span style="color:#4285F4;">f</span>
  </h1>

  <input id="q" placeholder="Suche oder URL eingeben">
  <button onclick="go()">Suchen</button>

</div>

<script>

/* CLOCK */
function updateClock(){
  let now = new Date();
  let h = String(now.getHours()).padStart(2,"0");
  let m = String(now.getMinutes()).padStart(2,"0");
  let s = String(now.getSeconds()).padStart(2,"0");
  document.getElementById("clock").innerText = h+":"+m+":"+s;
}
setInterval(updateClock,1000);
updateClock();

/* SEARCH */
function go(){
  let q = document.getElementById("q").value.trim();
  if(!q) return;

  let url;

  if(q.includes(".") && !q.includes(" ")){
    if(!q.startsWith("http")) q = "https://" + q;
    url = q;
  } else {
    url = "https://www.google.com/search?q=" + encodeURIComponent(q);
  }

  window.open(url,"_blank");
}

/* POP SOUND */
function playPop(){
  const audio = new Audio("https://www.myinstants.com/media/sounds/pop.mp3");
  audio.volume = 0.4;
  audio.play();
}

/* BUBBLES */
const layer = document.getElementById("bubbleLayer");

const colors = [
  "#00f5ff",
  "#ff2d75",
  "#8b5cf6",
  "#34A853",
  "#FBBC05"
];

function createBubble(){
  const b = document.createElement("div");
  b.classList.add("bubble");

  let size = 15 + Math.random()*50;

  b.style.width = size + "px";
  b.style.height = size + "px";

  b.style.left = Math.random()*window.innerWidth + "px";

  b.style.animationDuration = (5 + Math.random()*6) + "s";

  // RANDOM COLOR
  let color = colors[Math.floor(Math.random()*colors.length)];
  b.style.background = `radial-gradient(circle at 30% 30%, ${color}, rgba(255,255,255,0.1))`;

  layer.appendChild(b);

  // CLICK = POP 💥
  b.addEventListener("click", () => {
    playPop();
    b.classList.add("pop");
    setTimeout(()=>b.remove(),250);
  });

  setTimeout(()=>b.remove(),12000);
}

setInterval(createBubble,200);

</script>

</body>
</html>
