<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supersurf GX</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0b0b12;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:70px;
  background:#11111a;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
  gap:20px;
}

.icon{
  width:40px;
  height:40px;
  background:#1f1f2e;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

/* TOP BAR */
.topbar{
  position:fixed;
  left:70px;
  right:0;
  top:0;
  height:50px;
  background:#141424;
  display:flex;
  align-items:center;
  padding:0 10px;
  gap:10px;
}

.tabs{
  display:flex;
  gap:5px;
}

.tab{
  background:#1f1f2e;
  padding:8px 15px;
  border-radius:8px;
  font-size:12px;
}

/* MAIN */
.main{
  margin-left:70px;
  margin-top:50px;
  width:100%;
  height:calc(100vh - 50px);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* SEARCH */
input{
  width:60%;
  padding:15px;
  border-radius:30px;
  border:none;
  font-size:16px;
  outline:none;
}

button{
  margin-top:10px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#ff2d75;
  color:white;
  cursor:pointer;
}

iframe{
  margin-top:20px;
  width:90%;
  height:70%;
  border:none;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="icon">🏠</div>
  <div class="icon">🔍</div>
  <div class="icon">⭐</div>
  <div class="icon">⚙️</div>
</div>

<div class="topbar">
  <div class="tabs">
    <div class="tab">New Tab</div>
  </div>
</div>

<div class="main">

  <input id="q" placeholder="Search or enter URL">
  <button onclick="go()">Go</button>

  <iframe id="frame"></iframe>

</div>

<script>

function go(){
  let q = document.getElementById("q").value;

  let url;

  if(q.includes(".") && !q.includes(" ")){
    if(!q.startsWith("http")) q = "https://" + q;
    url = q;
  } else {
    url = "https://duckduckgo.com/?q=" + encodeURIComponent(q);
  }

  document.getElementById("frame").src = url;
}

</script>

</body>
</html>
