<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supersurf</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f0f1a,#1b1b2e);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* Hintergrund Kreise */

.bg1,.bg2,.bg3{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.4;
}

.bg1{
  width:300px;
  height:300px;
  background:#ff2d75;
  top:-100px;
  left:-100px;
}

.bg2{
  width:250px;
  height:250px;
  background:#00f5ff;
  bottom:-100px;
  right:-100px;
}

.bg3{
  width:200px;
  height:200px;
  background:#8b5cf6;
  top:50%;
  left:60%;
}

/* Hauptbox */

.box{
  position:relative;
  z-index:2;
  width:90%;
  max-width:650px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:40px;
  border-radius:25px;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
}

/* Logo */

.logo{
  font-size:75px;
  font-weight:bold;
  margin-bottom:25px;
  letter-spacing:2px;
}

/* Suchleiste */

.search-container{
  position:relative;
}

input{
  width:100%;
  padding:18px 20px;
  border:none;
  border-radius:40px;
  font-size:18px;
  outline:none;
  background:#fff;
  color:#111;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* Button */

button{
  margin-top:15px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:40px;
  background:linear-gradient(90deg,#ff2d75,#ff6a00);
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 0 20px rgba(255,45,117,0.5);
}

button:hover{
  transform:scale(1.03);
}

/* Schnellzugriffe */

.shortcuts{
  margin-top:30px;
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.shortcut{
  width:80px;
  height:80px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.2s;
  font-size:14px;
}

.shortcut:hover{
  transform:translateY(-5px);
  background:rgba(255,255,255,0.15);
}

.shortcut img{
  width:35px;
  margin-bottom:5px;
}

.small{
  margin-top:25px;
  color:#aaa;
  font-size:12px;
}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<div class="box">

  <!-- Logo -->

  <h1 class="logo">
    <span style="color:#4285F4;">S</span>
    <span style="color:#EA4335;">u</span>
    <span style="color:#FBBC05;">p</span>
    <span style="color:#34A853;">e</span>
    <span style="color:#4285F4;">r</span>
    <span style="color:#EA4335;">s</span>
    <span style="color:#FBBC05;">u</span>
    <span style="color:#34A853;">r</span>
    <span style="color:#4285F4;">f</span>
  </h1>

  <!-- Suche -->

  <div class="search-container">
    <input id="q" placeholder="Suche oder URL eingeben">
  </div>

  <button onclick="go()">Suchen</button>

  <!-- Schnellzugriffe -->

  <div class="shortcuts">

    <div class="shortcut"
    onclick="openSite('https://www.youtube.com')">
      ▶️
      <div>YouTube</div>
    </div>

    <div class="shortcut"
    onclick="openSite('https://www.google.com')">
      🔍
      <div>Google</div>
    </div>

    <div class="shortcut"
    onclick="openSite('https://www.tiktok.com')">
      🎵
      <div>TikTok</div>
    </div>

    <div class="shortcut"
    onclick="openSite('https://discord.com')">
      💬
      <div>Discord</div>
    </div>

  </div>

  <div class="small">
    SUPERSURF • Fast • Clean • Modern
  </div>

</div>

<script>

function go(){

  let q =
  document.getElementById("q").value.trim();

  if(!q) return;

  let url;

  // URL erkannt
  if(q.includes(".") && !q.includes(" ")){

    if(!q.startsWith("http")){
      q = "https://" + q;
    }

    url = q;
  }

  // Normale Suche
  else{

    url =
    "https://www.google.com/search?q="
    + encodeURIComponent(q);

  }

  window.open(url,"_blank");
}

function openSite(url){
  window.open(url,"_blank");
}

// Enter Taste

document
.getElementById("q")
.addEventListener("keydown",function(e){

  if(e.key==="Enter"){
    go();
  }

});

</script>

</body>
</html>
