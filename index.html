<!DOCTYPE html>
<html>
<head>
  <title>Simplesurf</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    .bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      background: #f1f1f1;
    }

    input {
      width: 300px;
      padding: 8px;
      font-size: 14px;
    }

    iframe {
      width: 100%;
      height: 90vh;
      border: none;
    }
  </style>
</head>

<body>

<div class="bar">
  <input id="url" placeholder="google.com">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
function go() {
  let url = document.getElementById('url').value;

  if (!url.startsWith('http')) {
    url = 'https://' + url;
  }

  document.getElementById('frame').src = url;
}
</script>

</body>
</html>
